<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRoute</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <!-- Leaflet Fallback -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body {
      background-color: #f1f5f9;
      font-family: 'Outfit', sans-serif;
      color: #0f172a;
    }

    #map {
      height: 65vh;
      width: 100%;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }

    .info-box {
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      height: 100%;
    }

    .info-box h5 {
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 20px;
    }

    .search-input {
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      padding: 12px;
      font-size: 0.95rem;
    }

    .btn-plan {
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-weight: 600;
      transition: all 0.2s ease;
      width: 100%;
    }

    .btn-plan:hover {
      background-color: #4338ca;
      transform: translateY(-1px);
    }

    .route-option {
      padding: 16px;
      background: #f8fafc;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .route-option:hover {
      background: #f1f5f9;
      border-color: #4f46e5;
    }

    .highlighted-route {
      border: 2px solid #4f46e5 !important;
      background: #eef2ff !important;
    }

    .route-distance {
      font-size: 1.1rem;
      font-weight: 700;
      color: #4f46e5;
    }

    .route-duration {
      font-size: 0.95rem;
      color: #1e293b;
    }

    .route-emission {
      font-size: 0.95rem;
      color: #ef4444;
      font-weight: 600;
    }

    #download-pdf {
      background-color: #0f172a;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 32px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    #download-pdf:hover {
      background-color: #1e293b;
      transform: translateY(-1px);
    }



    @media (max-width: 768px) {
      #map {
        margin-top: 30px;
      }

      .info-box {
        margin-bottom: 30px;
      }
    }
  </style>
</head>

<body>
  {% include 'navbar.html' %}

  <div class="container-fluid my-4">
    <h1 class="text-center text-dark mb-4">Efficient Route Planner</h1>
    <div class="row">
      <div class="col-md-3">
        <div class="info-box">
          <h5>Set Your Locations</h5>
          <div class="mb-3">
            <label class="form-label small text-muted">Search & Select Address</label>
            <div class="input-group">
                <input type="text" id="addressSearch" class="form-control" placeholder="e.g. T. Nagar, Chennai">
                <button class="btn btn-outline-secondary" type="button" onclick="searchAddress()">Search</button>
            </div>
            <div id="search-results" class="list-group mt-1" style="display:none; position:absolute; z-index:1000; width:90%; max-height:200px; overflow-y:auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"></div>
          </div>
          <input id="start-input" type="text" class="form-control mb-2" placeholder="Start Coords (or click map)" />
          <input id="end-input" type="text" class="form-control mb-2" placeholder="End Coords (or click map)" />
          <div class="form-group mt-3">
            <label for="mode-select">Select Mode</label>
            <select id="mode-select" class="form-control">
              <option value="DRIVING">Car</option>
              <option value="BICYCLING">Bike</option>
              <option value="TRANSIT">Bus</option>
              <option value="TRUCK">Truck</option>
            </select>
          </div>
          <div class="form-group mt-3">
            <label for="fuel-type">Select Fuel Type</label>
            <select id="fuel-type" class="form-control">
              <option value="PETROL">Petrol</option>
              <option value="DIESEL">Diesel</option>
              <option value="ELECTRIC">Electric</option>
              <option value="CNG">CNG</option>
            </select>
          </div>
          <div class="form-check mt-3">
            <input class="form-check-input" type="checkbox" id="traffic-toggle">
            <label class="form-check-label" for="traffic-toggle">Enable Traffic</label>
          </div>
          <button id="plan-route" class="btn btn-plan mt-3">
            Plan Route
          </button>
        </div>
      </div>

      <div class="col-md-6">
        <div id="map"></div>
      </div>

      <div class="col-md-3">
        <div class="info-box">
          <h5>Route Options</h5>
          <div id="route-info" class="list-group"></div>
        </div>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-md-12">
        <div class="info-box">
          <h5>Route Summary</h5>
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Location</th>
                  <th>Estimated Arrival</th>
                  <th>Distance (km)</th>
                  <th>Duration (mins)</th>
                </tr>
              </thead>
              <tbody id="route-details"></tbody>
            </table>
          </div>
          <p id="weather" class="text-muted">Weather information will appear here.</p>
        </div>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-md-12 text-center">
        <button id="download-pdf" class="btn btn-plan">
          Offline - Download Route Map as PDF!
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    // Default to Leaflet for 100% free operation
    window.addEventListener('DOMContentLoaded', () => {
      initLeafletFallback();
    });
  </script>
  <script>
    let leafletMap;
    let markers = [];

    function initLeafletFallback() {
      if (leafletMap) return;
      const mapDiv = document.getElementById("map");
      mapDiv.innerHTML = "";
      leafletMap = L.map(mapDiv).setView([13.0827, 80.2707], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(leafletMap);
    }

    document.getElementById("plan-route").addEventListener("click", () => {
      const start = document.getElementById("start-input").value.trim();
      const end = document.getElementById("end-input").value.trim();
      
      if (start && end) {
        calculateRoutes(start, end);
      } else {
        alert("Please enter both locations.");
      }
    });

    async function calculateRoutes(start, end) {
      try {
        const response = await fetch('/get-routes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ start, end })
        });
        const data = await response.json();
        displayRoutes(data.routes, start, end);
      } catch (e) {
        console.error("Error:", e);
      }
    }

    let polylines = [];

    async function searchAddress() {
        const query = document.getElementById('addressSearch').value;
        if (!query) return;
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = '<div class="list-group-item">Searching...</div>';
        resultsDiv.style.display = 'block';

        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
            const data = await response.json();
            resultsDiv.innerHTML = '';
            if (data.length === 0) {
                resultsDiv.innerHTML = '<div class="list-group-item">No results found</div>';
                return;
            }
            data.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'list-group-item list-group-item-action text-start small';
                btn.innerText = item.display_name;
                btn.onclick = () => {
                    const lat = parseFloat(item.lat);
                    const lon = parseFloat(item.lon);
                    leafletMap.setView([lat, lon], 14);
                    L.marker([lat, lon]).addTo(leafletMap).bindPopup(item.display_name).openPopup();
                    resultsDiv.style.display = 'none';
                    if (!document.getElementById('start-input').value) document.getElementById('start-input').value = `${lat},${lon}`;
                    else if (!document.getElementById('end-input').value) document.getElementById('end-input').value = `${lat},${lon}`;
                };
                resultsDiv.appendChild(btn);
            });
        } catch (error) {
            console.error('Search error:', error);
            resultsDiv.innerHTML = '<div class="list-group-item text-danger">Search failed</div>';
        }
    }

    async function getOSRMRoute(startCoords, endCoords) {
        try {
            const s = startCoords.split(',').map(c => c.trim());
            const e = endCoords.split(',').map(c => c.trim());
            if (s.length !== 2 || e.length !== 2) return null;
            const url = `https://router.project-osrm.org/route/v1/driving/${s[1]},${s[0]};${e[1]},${e[0]}?overview=full&geometries=geojson`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.code === 'Ok' && data.routes.length > 0) {
                return data.routes[0].geometry.coordinates.map(coord => [coord[1], coord[0]]);
            }
        } catch (e) { console.error("OSRM Error:", e); }
        return null;
    }

    async function displayRoutes(routes, start, end) {
      const routeInfo = document.getElementById("route-info");
      const routeDetails = document.getElementById("route-details");
      const weatherInfo = document.getElementById("weather");
      
      routeInfo.innerHTML = "";
      routeDetails.innerHTML = "";
      weatherInfo.innerText = "Weather: 29°C | AQI: 45 (Good) - Optimized for Sustainability";
      
      markers.forEach(m => leafletMap.removeLayer(m));
      markers = [];
      polylines.forEach(p => leafletMap.removeLayer(p));
      polylines = [];

      for (let index = 0; index < routes.length; index++) {
        const route = routes[index];
        const routeElement = document.createElement("div");
        routeElement.classList.add("route-option", "p-2", "mb-2", "border", "rounded");
        routeElement.innerHTML = `
          <h6>${route.summary}</h6>
          <p class="small mb-0"><b>Dist:</b> ${route.distance} | <b>Time:</b> ${route.duration}</p>
          <p class="small mb-0 text-success"><b>CO₂ Saved:</b> ${parseFloat(route.emissions)*0.4} kg (vs standard)</p>
        `;
        routeInfo.appendChild(routeElement);

        routeDetails.innerHTML += `
          <tr>
            <td>${index + 1}</td>
            <td>${end}</td>
            <td>In ${route.duration}</td>
            <td>${route.distance}</td>
            <td>${route.duration}</td>
          </tr>`;

        let sLat, sLng, eLat, eLng;
        try {
            [sLat, sLng] = start.split(',').map(Number);
            [eLat, eLng] = end.split(',').map(Number);
        } catch(e) {
            [sLat, sLng] = [13.0827, 80.2707];
            [eLat, eLng] = [13.0475, 80.2089];
        }
        
        const sm = L.marker([sLat, sLng]).addTo(leafletMap).bindPopup("Start");
        const em = L.marker([eLat, eLng]).addTo(leafletMap).bindPopup("End");
        markers.push(sm, em);
        
        const roadPoints = await getOSRMRoute(start, end);
        if (roadPoints) {
            const poly = L.polyline(roadPoints, { color: '#4f46e5', weight: 5, opacity: 0.8 }).addTo(leafletMap);
            polylines.push(poly);
        } else {
            const poly = L.polyline([[sLat, sLng], [eLat, eLng]], { color: '#4f46e5', weight: 4, opacity: 0.6, dashArray: '5, 10' }).addTo(leafletMap);
            polylines.push(poly);
        }
      }
      
      if (markers.length > 0) {
        const group = new L.featureGroup([...markers, ...polylines]);
        leafletMap.fitBounds(group.getBounds(), { padding: [40, 40] });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      initLeafletFallback();
      // Disable PDF for now as it used Google Static Maps
      const downloadPdf = document.getElementById("download-pdf");
      if (downloadPdf) downloadPdf.style.display = "none";
    });
  </script>
</body>

</html>
