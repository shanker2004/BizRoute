<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRoute - Efficient Route Planner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      background-color: #f1f5f9;
      font-family: 'Outfit', sans-serif;
      color: #0f172a;
    }

    #map {
      height: 65vh;
      width: 100%;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }

    .info-box {
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      height: 100%;
    }

    .info-box h5 {
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 20px;
    }

    .pac-target-input {
      margin-bottom: 15px;
      border-radius: 8px;
    }

    .btn-plan {
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-weight: 600;
      transition: all 0.2s ease;
      width: 100%;
    }

    .btn-plan:hover {
      background-color: #4338ca;
      transform: translateY(-1px);
    }

    .route-option {
      padding: 16px;
      background: #f8fafc;
      margin-bottom: 12px;
      border-radius: 10px;
      border-left: 5px solid transparent;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      transition: all 0.2s ease;
    }

    .route-option:hover {
      background: #f1f5f9;
    }

    .route-distance {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .route-duration {
      font-size: 0.95rem;
      color: #1e293b;
    }

    .route-emission {
      font-size: 0.95rem;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      #map {
        margin-top: 30px;
      }

      .info-box {
        margin-bottom: 30px;
      }
    }
  </style>

  <!-- Google Maps API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBe18wGLYbedCZOCatcP9bYzAXKRbYBGoo&libraries=places,geometry&callback=initMap" async defer></script>
</head>

<body>
  {% include 'navbar.html' %}

  <div class="container-fluid my-4">
    <h1 class="text-center text-dark mb-4">Core Routing Feature</h1>
    <div class="row">
      <div class="col-md-3">
        <div class="info-box d-flex flex-column">
          <h5>1. Setup Origin & Destination</h5>
          <input id="start-input" type="text" class="form-control mb-3 pac-target-input" placeholder="Origin (e.g. Current Location)">
          <input id="end-input" type="text" class="form-control mb-3 pac-target-input" placeholder="Destination (e.g. Warehouse A)">

          <div class="form-group mt-auto">
            <button id="plan-route" class="btn btn-plan mt-3">
              Generate Routes <i class="fas fa-route ms-1"></i>
            </button>
            <button id="clear-route" class="btn btn-outline-danger w-100 mt-2">
              Clear All
            </button>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div id="map"></div>
      </div>

      <div class="col-md-3">
        <div class="info-box">
          <h5>Route Summary</h5>
          <p class="text-muted small">Compare distances, times, and emissions across 3 routing options below.</p>
          <div id="route-info" class="d-flex flex-column gap-2">
            <!-- Dynamically populated route panels -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let map;
    let directionsService;
    let polylines = [];
    let endsMarkers = [];

    function initMap() {
      // Initialize map centered on Chennai
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 13.0827, lng: 80.2707 },
        zoom: 12,
        styles: [
          { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] } // Clean UI
        ],
        streetViewControl: false,
        mapTypeControl: false
      });

      directionsService = new google.maps.DirectionsService();

      // Configure Autocomplete
      const startInput = document.getElementById("start-input");
      const endInput = document.getElementById("end-input");

      new google.maps.places.Autocomplete(startInput);
      new google.maps.places.Autocomplete(endInput);

      document.getElementById("plan-route").addEventListener("click", () => {
        const originStr = startInput.value.trim();
        const destStr = endInput.value.trim();
        if (!originStr || !destStr) {
          alert("Please enter both an Origin and a Destination.");
          return;
        }
        calculateAndRenderRoutes(originStr, destStr);
      });

      document.getElementById("clear-route").addEventListener("click", () => {
        startInput.value = "";
        endInput.value = "";
        clearAll();
      });
    }

    function clearAll() {
      // Clear polylines
      polylines.forEach(p => p.setMap(null));
      polylines = [];
      // Clear markers
      endsMarkers.forEach(m => m.setMap(null));
      endsMarkers = [];
      document.getElementById("route-info").innerHTML = "";
    }

    function calculateAndRenderRoutes(origin, destination) {
      clearAll();
      document.getElementById("route-info").innerHTML = "<div class='text-center '><div class='spinner-border text-primary speed-light mt-3'></div><br><small>Analyzing pathways...</small></div>";

      const request = {
        origin: origin,
        destination: destination,
        travelMode: google.maps.TravelMode.DRIVING,
        provideRouteAlternatives: true, // We want 3 routes if possible!
        drivingOptions: {
          departureTime: new Date(Date.now()), // include traffic data
          trafficModel: 'bestguess'
        }
      };

      directionsService.route(request, (result, status) => {
        if (status === "OK") {
          document.getElementById("route-info").innerHTML = "";
          drawRoutes(result.routes);
        } else {
          alert("Directions calculation failed: " + status);
          document.getElementById("route-info").innerHTML = "";
        }
      });
    }

    function drawRoutes(routes) {
      // Design configuration for up to 3 routes
      const themeColors = [
        { label: "Eco", color: "#54A84D", id: "route-eco", icon: 'fa-leaf', strokeDash: false }, // Green
        { label: "Fastest", color: "#4f46e5", id: "route-fastest", icon: 'fa-bolt', strokeDash: false }, // Blue
        { label: "Balanced", color: "#f59e0b", id: "route-balanced", icon: 'fa-scale-balanced', strokeDash: true }, // Yellow
      ];

      // Limit to 3 routes max
      const topRoutes = routes.slice(0, 3);

      const bounds = new google.maps.LatLngBounds();

      // Render origin and destination markers manually
      if (topRoutes.length > 0) {
        const startLoc = topRoutes[0].legs[0].start_location;
        const endLoc = topRoutes[0].legs[topRoutes[0].legs.length - 1].end_location;
        
        const sm = new google.maps.Marker({
          position: startLoc, map: map, title: "Origin",
          zIndex: 100
        });
        const em = new google.maps.Marker({
          position: endLoc, map: map, title: "Destination",
          zIndex: 100
        });
        endsMarkers.push(sm, em);
      }

      topRoutes.forEach((route, index) => {
        const theme = themeColors[index] || themeColors[0];
        
        let distanceMeters = 0;
        let durationSeconds = 0;
        
        route.legs.forEach(leg => {
          distanceMeters += leg.distance.value;
          durationSeconds += (leg.duration_in_traffic ? leg.duration_in_traffic.value : leg.duration.value);
        });

        const distanceKm = (distanceMeters / 1000).toFixed(1);
        const durationMins = Math.round(durationSeconds / 60);

        // Simulated CO2 metric (kg) - Eco rule is 0.12 kg/km, others maybe a bit more
        let co2Multiplier = 0.15;
        if (theme.label === "Eco") co2Multiplier = 0.10;
        if (theme.label === "Balanced") co2Multiplier = 0.13;
        
        const co2Kg = (distanceKm * co2Multiplier).toFixed(1);

        // Create Panel Element
        const routeLetter = String.fromCharCode(65 + index); // A, B, C
        createRouteSummaryPanel(theme, distanceKm, durationMins, co2Kg, routeLetter);

        // Gather path points and adjust map bounds
        const path = route.overview_path;
        path.forEach(p => bounds.extend(p));

        // Create Polyline (we draw path arrays dynamically for animation)
        const polyOptions = {
          path: [],
          geodesic: true,
          strokeColor: theme.color,
          strokeOpacity: theme.strokeDash ? 0.0 : 0.8, // If dashed, we rely on icons
          strokeWeight: 6,
          zIndex: topRoutes.length - index, // Fastest on top
          map: map
        };

        // Pseudo-dashed line effect for Google Maps wrapper
        if (theme.strokeDash) {
          polyOptions.icons = [{
            icon: {
              path: 'M 0,-1 0,1',
              strokeOpacity: 0.9,
              strokeColor: theme.color,
              scale: 3
            },
            offset: '0',
            repeat: '20px'
          }];
        }

        const polyline = new google.maps.Polyline(polyOptions);
        polylines.push(polyline);
        
        // Exceute Smooth Path-Drawing Animation 
        animatePath(polyline, path);
      });

      map.fitBounds(bounds);
    }

    function createRouteSummaryPanel(theme, distance, duration, co2, letter) {
      const infoBox = document.getElementById("route-info");
      
      const div = document.createElement("div");
      div.className = "route-option";
      div.style.borderLeftColor = theme.color;

      div.innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h6 class="mb-0 fw-bold" style="color: ${theme.color}"><i class="fas ${theme.icon} me-1"></i> Route ${letter}: ${theme.label}</h6>
          <span class="badge bg-light text-dark shadow-sm border border-secondary border-opacity-25">${duration} mins</span>
        </div>
        <div class="d-flex justify-content-between text-muted align-items-end">
          <div class="route-distance text-dark">${distance} km</div>
          <div class="route-emission text-success fw-bold p-1 rounded" style="background: rgba(84,168,77,0.1);"><i class="fas fa-leaf me-1"></i>${co2} kg CO₂</div>
        </div>
      `;
      infoBox.appendChild(div);
    }

    // Interval animation adding points to polyline sequentially over 1 second total
    function animatePath(polyline, pathArray) {
      const frames = parseInt(pathArray.length / 2) || 1; // roughly 2 points per frame
      let count = 0;
      
      // Calculate delay so the entire animation takes roughly ~1.5s
      const delay = Math.max(1500 / pathArray.length, 10); 
      
      const timer = window.setInterval(() => {
        if (count >= pathArray.length) {
          window.clearInterval(timer);
          return;
        }
        
        const partialPath = polyline.getPath();
        partialPath.push(pathArray[count]);
        if(pathArray[count+1]) {
           partialPath.push(pathArray[count+1]);
        }
        count += 2;
      }, delay);
    }
  </script>
</body>

</html>
