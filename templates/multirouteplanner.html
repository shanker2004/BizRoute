<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Destination Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Outfit', sans-serif;
            color: #0f172a;
        }

        .container {
            max-width: 1200px;
        }

        #map {
            height: 500px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            margin-bottom: 24px;
        }

        .info-card {
            padding: 24px;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        .info-card h5 {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 20px;
        }

        .btn-custom {
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-custom:hover {
            background-color: #4338ca;
            transform: translateY(-1px);
        }

        .form-control,
        .form-select {
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            padding: 10px;
        }

        label {
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.5rem;
        }

        .table {
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .table thead {
            background-color: #f8fafc;
        }
    </style>

    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBe18wGLYbedCZOCatcP9bYzAXKRbYBGoo&libraries=places,geometry&callback=initMap" async defer></script>
</head>

<body>
    {% include 'navbar.html' %}
    <div class="container my-5">

        <h1 class="text-center mb-4">Smart Destination Planner</h1>

        <div class="row">
            <div class="col-lg-4 mb-3">
                <div class="info-card">
                    <form id="route-form">
                        <div class="mb-3">
                            <label for="start-location" class="form-label">Start Location:</label>
                            <input type="text" id="start-location" class="form-control"
                                placeholder="Enter start location" required>
                            <button id="geolocate" type="button" class="btn btn-sm btn-link mt-2">Use My
                                Location</button>
                        </div>
                        <div class="mb-3">
                            <label for="final-destination" class="form-label">Final Destination:</label>
                            <input type="text" id="final-destination" class="form-control"
                                placeholder="Enter final destination" required>
                            <small id="destinationHelp" class="form-text text-muted">
                                Mention the final destination for the optimal route.
                            </small>
                        </div>
                        <div class="mb-3">
                            <label for="destinations" class="form-label">Intermediate Destinations:</label>
                            <textarea id="destinations" class="form-control" rows="4"
                                placeholder="Enter destinations, one per line (Optional)"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="travel-mode" class="form-label">Travel Mode:</label>
                            <select id="travel-mode" class="form-select">
                                <option value="DRIVING">Driving</option>
                                <option value="WALKING">Walking</option>
                                <option value="BICYCLING">Bicycling</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-custom w-100" id="plan-btn">
                            <span id="btn-text">Plan My Route</span>
                            <span id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div id="map"></div>
            </div>
        </div>

        <div class="info-card mt-4">
            <h5>Route Summary</h5>
            <div id="route-results">
                <table class="table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Location</th>
                            <th>Arrival</th>
                            <th>Dist (km)</th>
                            <th>Dur (min)</th>
                            <th>CO2 (kg)</th>
                            <th>Cost (Est)</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="route-details"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let map;
        let directionsService;
        let directionsRenderer;

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 13.0827, lng: 80.2707 },
                zoom: 12,
                styles: [
                  { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] } 
                ]
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                suppressMarkers: false,
                polylineOptions: {
                    strokeColor: "#4f46e5",
                    strokeWeight: 5
                }
            });

            // Autocomplete inputs
            new google.maps.places.Autocomplete(document.getElementById("start-location"));
            new google.maps.places.Autocomplete(document.getElementById("final-destination"));

            // Handle Geolocation matching frontend button "Use My Location"
            document.getElementById("geolocate").addEventListener("click", () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const pos = {
                                lat: position.coords.latitude,
                                lng: position.coords.longitude,
                            };
                            map.setCenter(pos);
                            map.setZoom(14);
                            // Reverse geocode to get an address string for the input
                            const geocoder = new google.maps.Geocoder();
                            geocoder.geocode({ location: pos }, (results, status) => {
                                if (status === "OK" && results[0]) {
                                    document.getElementById("start-location").value = results[0].formatted_address;
                                } else {
                                    document.getElementById("start-location").value = `${pos.lat}, ${pos.lng}`;
                                }
                            });
                        },
                        () => {
                            alert("Geolocation failed or denied.");
                        }
                    );
                }
            });

            const routeForm = document.getElementById("route-form");
            routeForm.addEventListener("submit", function (event) {
                event.preventDefault();
                const start = document.getElementById("start-location").value;
                const finalDestination = document.getElementById("final-destination").value;
                const destinationsValue = document.getElementById("destinations").value;
                const intermediateDestinations = destinationsValue.split("\n").filter(Boolean);
                const travelMode = document.getElementById("travel-mode").value;

                calculateRoute(start, finalDestination, intermediateDestinations, travelMode);
            });
        }

        async function calculateRoute(start, finalDestination, intermediateDestinations, travelMode) {
            const btn = document.getElementById('plan-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            
            btn.disabled = true;
            btnText.innerText = "Planning...";
            btnSpinner.classList.remove('d-none');

            const waypoints = intermediateDestinations.map(dest => ({
                location: dest,
                stopover: true
            }));

            const request = {
                origin: start,
                destination: finalDestination,
                waypoints: waypoints,
                optimizeWaypoints: true,
                travelMode: google.maps.TravelMode[travelMode]
            };

            directionsService.route(request, (result, status) => {
                btn.disabled = false;
                btnText.innerText = "Plan My Route";
                btnSpinner.classList.add('d-none');

                if (status === "OK") {
                    directionsRenderer.setDirections(result);
                    displaySummary(result);
                } else {
                    alert("Route calculation failed: " + status);
                }
            });
        }

        function displaySummary(result) {
            const detailsTable = document.getElementById("route-details");
            detailsTable.innerHTML = "";

            const route = result.routes[0];
            let totalDist = 0;
            let totalDur = 0;

            route.legs.forEach((leg, i) => {
                const distKm = (leg.distance.value / 1000).toFixed(1);
                const durMin = Math.round(leg.duration.value / 60);
                const co2 = (distKm * 0.12).toFixed(1); // approx CO2 calc

                totalDist += leg.distance.value;
                totalDur += leg.duration.value;

                detailsTable.innerHTML += `
                    <tr>
                        <td>${i + 1}</td>
                        <td><small>${leg.end_address}</small></td>
                        <td>${leg.duration.text}</td>
                        <td>${distKm} km</td>
                        <td>${durMin} min</td>
                        <td><span class="badge bg-light text-success">${co2} kg</span></td>
                        <td><strong class="text-primary">-</strong></td>
                        <td><span class="badge bg-success">Optimized</span></td>
                    </tr>`;
            });
        }
    </script>
</body>

</html>
