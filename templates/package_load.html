<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Package Load Optimization</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Outfit', sans-serif;
            color: #0f172a;
        }

        h2 {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1.5rem;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            padding: 10px;
        }

        .btn-primary {
            background-color: #4f46e5;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
        }

        .alert-secondary {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            color: #1e293b;
            border-radius: 12px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }
    </style>
</head>

<body>
    {% include 'navbar.html' %}

    <div class="container mt-4">
        <h2>Package Load Optimization</h2>
        <p>Fill in the package details below for optimal vehicle load distribution.</p>

        <form id="packageLoadForm">
            <div class="mb-3">
                <label for="vehicle_capacity" class="form-label">Vehicle Capacity (kg)</label>
                <input type="number" class="form-control" id="vehicle_capacity" required>
            </div>

            <div class="mb-3">
                <label for="package_weight" class="form-label">Package Weight (kg)</label>
                <input type="number" class="form-control" id="package_weight" required>
            </div>

            <div class="mb-3">
                <label for="num_packages" class="form-label">Number of Packages</label>
                <input type="number" class="form-control" id="num_packages" required>
            </div>

            <button type="submit" class="btn btn-primary">Calculate</button>
        </form>

        <div class="mt-4" id="result">
            <h3>Suggested Load Plan:</h3>
            <div id="loadDetails" class="alert alert-secondary" style="display: none;"></div>
            <div id="error" class="alert alert-danger" style="display: none;"></div>
        </div>
    </div>

    <script>
        document.getElementById('packageLoadForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const vehicleCapacity = document.getElementById('vehicle_capacity').value;
            const packageWeight = document.getElementById('package_weight').val; // Wait, val() in jQuery, value in JS
            const numPackages = document.getElementById('num_packages').value;
            const loadDetails = document.getElementById('loadDetails');
            const errorDiv = document.getElementById('error');

            // Correcting previous thought: .value for all inputs
            const vCap = document.getElementById('vehicle_capacity').value;
            const pWeight = document.getElementById('package_weight').value;
            const nPack = document.getElementById('num_packages').value;

            if (!vCap || !pWeight || !nPack) {
                errorDiv.innerText = 'All fields are required';
                errorDiv.style.display = 'block';
                return;
            }
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/package_load', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        vehicle_capacity: vCap,
                        package_weight: pWeight,
                        num_packages: nPack
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    loadDetails.innerHTML = `
                        <p><strong>Required Vehicles:</strong> ${data.required_vehicles}</p>
                        <p><strong>Packages per Vehicle:</strong> ${data.packages_per_vehicle}</p>
                    `;
                    loadDetails.style.display = 'block';
                    errorDiv.style.display = 'none';
                } else {
                    errorDiv.innerText = data.error || 'An error occurred';
                    errorDiv.style.display = 'block';
                    loadDetails.style.display = 'none';
                }
            } catch (error) {
                console.error('Error:', error);
                errorDiv.innerText = 'Failed to connect to server';
                errorDiv.style.display = 'block';
                loadDetails.style.display = 'none';
            }
        });
    </script>
</body>

</html>
