<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Route Optimization</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/fa-all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Leaflet Fallback -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Modern async loading for Google Maps
        (function () {
            const script = document.createElement('script');
            script.src = "https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=places,geometry&callback=initMap&loading=async";
            script.async = true;
            script.defer = true;
            script.onerror = () => {
                console.warn("Google Maps failed to load. Falling back to Leaflet.");
                initLeafletFallback();
            };
            document.head.appendChild(script);
        })();
    </script>

    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Outfit', sans-serif;
            color: #0f172a;
        }

        h1 {
            font-weight: 700;
            color: #1e293b;
            margin: 40px 0;
            text-align: center;
        }

        #map {
            height: 400px;
            width: 100%;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            margin-bottom: 30px;
        }

        .route-summary {
            background-color: #1e293b;
            color: white;
            text-align: center;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .route-summary h3 {
            font-weight: 700;
            margin-bottom: 15px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: #4f46e5;
        }

        .card p strong {
            color: #475569;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            #map {
                height: 300px;
            }

            .route-summary h3 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    {% include 'navbar.html' %}

    <h1>Delivery Route Optimization</h1>

    <div class="container">
        <div id="map"></div>
    </div>

    <div class="details-container">
        <div id="details" class="cards-grid"></div>
    </div>

    <script>
        let map;
        let leafletMap;
        let isGoogleMapsLoaded = false;

        function initMap() {
            console.log("Google Maps initMap called");
            isGoogleMapsLoaded = true;
            fetchDataAndDisplayRoute();
        }

        function initLeafletFallback(data = null) {
            if (leafletMap) return;
            console.log("Initializing Leaflet fallback...");
            const mapDiv = document.getElementById("map");
            mapDiv.innerHTML = "";

            const center = data && data.route_details && data.route_details.markers && data.route_details.markers.length > 0
                ? [data.route_details.markers[0].lat, data.route_details.markers[0].lng]
                : [13.0827, 80.2707]; // Default to Chennai

            leafletMap = L.map(mapDiv).setView(center, 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(leafletMap);

            if (data && data.route_details && data.route_details.markers) {
                data.route_details.markers.forEach((marker, index) => {
                    L.marker([marker.lat, marker.lng]).addTo(leafletMap)
                        .bindPopup(index === 0 ? "Start" : index === data.route_details.markers.length - 1 ? "End" : `Stop ${index}`);
                });

                const latlngs = data.route_details.markers.map(m => [m.lat, m.lng]);
                const polyline = L.polyline(latlngs, { color: '#007BFF', weight: 4 }).addTo(leafletMap);
                leafletMap.fitBounds(polyline.getBounds());
            }

            const alertDiv = document.createElement("div");
            alertDiv.className = "alert alert-warning mt-2";
            alertDiv.innerHTML = "<strong>Notice:</strong> Using OpenStreetMap fallback because Google Maps API key is invalid or restricted.";
            mapDiv.parentNode.insertBefore(alertDiv, mapDiv.nextSibling);

            // If we have data but Google failed, we still need to show details
            if (data && data.detailed_points) {
                displayDetails(data);
            }
        }

        const fetchDataAndDisplayRoute = async () => {
            try {
                console.log("Fetching delivery route data...");
                const currentLocation = await new Promise((resolve) => {
                    if (navigator.geolocation) {
                        const geoTimeout = setTimeout(() => {
                            console.warn("Geolocation timed out. Using fallback.");
                            resolve("13.0827,80.2707");
                        }, 3000);

                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                clearTimeout(geoTimeout);
                                resolve(`${position.coords.latitude},${position.coords.longitude}`);
                            },
                            (error) => {
                                clearTimeout(geoTimeout);
                                console.warn("Geolocation error:", error.message);
                                resolve("13.0827,80.2707");
                            },
                            { timeout: 3000 }
                        );
                    } else {
                        resolve("13.0827,80.2707");
                    }
                });

                const response = await fetch(`/delivery-partner?currentLocation=${currentLocation}`);
                const data = await response.json();

                if (!data || (!data.route_details && !data.detailed_points)) {
                    document.getElementById("map").innerHTML = `<div class="alert alert-info">No deliveries found for today. Please check back later.</div>`;
                    return;
                }

                // Always display details if we have points
                if (data.detailed_points) {
                    displayDetails(data);
                }

                if (isGoogleMapsLoaded && data.route_details && data.route_details.polyline) {
                    try {
                        const center = (data.route_details.markers && data.route_details.markers.length > 0)
                            ? { lat: data.route_details.markers[0].lat, lng: data.route_details.markers[0].lng }
                            : { lat: 13.0827, lng: 80.2707 };

                        map = new google.maps.Map(document.getElementById("map"), {
                            zoom: 12,
                            center: center,
                        });

                        const routePath = new google.maps.Polyline({
                            path: google.maps.geometry.encoding.decodePath(data.route_details.polyline),
                            geodesic: true,
                            strokeColor: "#007BFF",
                            strokeOpacity: 1.0,
                            strokeWeight: 4,
                        });
                        routePath.setMap(map);

                        const icons = {
                            start: { url: "https://maps.google.com/mapfiles/ms/icons/red-dot.png", scaledSize: new google.maps.Size(40, 40) },
                            end: { url: "https://maps.google.com/mapfiles/ms/icons/green-dot.png", scaledSize: new google.maps.Size(40, 40) },
                            intermediate: { url: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png", scaledSize: new google.maps.Size(40, 40) },
                        };

                        if (data.route_details.markers) {
                            data.route_details.markers.forEach((marker, index) => {
                                new google.maps.Marker({
                                    position: { lat: marker.lat, lng: marker.lng },
                                    map,
                                    icon: index === 0 ? icons.start :
                                        index === data.route_details.markers.length - 1 ? icons.end : icons.intermediate,
                                    label: {
                                        text: index === 0 ? "S" : index === data.route_details.markers.length - 1 ? "E" : `${index}`,
                                        color: "white",
                                        fontSize: "14px",
                                        fontWeight: "bold",
                                    },
                                });
                            });
                        }
                    } catch (e) {
                        console.error("Google Maps display failed:", e);
                        initLeafletFallback(data);
                    }
                } else {
                    initLeafletFallback(data);
                }

            } catch (error) {
                console.error("Error in fetchDataAndDisplayRoute:", error);
                document.getElementById("map").innerHTML = `<div class="alert alert-danger">An error occurred while loading delivery data.</div>`;
                initLeafletFallback();
            }
        };

        function displayDetails(data) {
            const detailsDiv = document.getElementById("details");
            detailsDiv.innerHTML = "";
            data.detailed_points.forEach((point) => {
                detailsDiv.innerHTML += `
                    <div class="card">
                        <p><strong>Product ID:</strong> ${point.productId}</p>
                        <p><strong>Estimated Time to Reach:</strong> ${point.estimated_time_reach}</p>
                        <p><strong>Distance from Origin:</strong> ${point.distance_from_origin}</p>
                        <p><strong>Location:</strong> ${point.location}</p>
                    </div>`;
            });

            detailsDiv.innerHTML += `
                <div class="route-summary">
                    <h3>Route Summary</h3>
                    <p><strong>Overall Distance:</strong> ${data.route_details.overall_distance} km</p>
                    <p><strong>Overall Time:</strong> ${data.route_details.overall_time} minutes</p>
                    <p><strong>Overall Carbon Emission:</strong> ${data.route_details.overall_carbon_emission} kg</p>
                </div>`;
        }

        // Trigger fetch if script load takes too long or fails
        setTimeout(() => {
            if (!isGoogleMapsLoaded && !leafletMap) {
                console.warn("Google Maps load timeout. Using Leaflet.");
                fetchDataAndDisplayRoute();
            }
        }, 5000);
    </script>
</body>

</html>
