<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Scheduling</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <!-- Leaflet Fallback -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Default to Leaflet for 100% free operation
    window.addEventListener('DOMContentLoaded', () => {
      initLeafletFallback();
    });
  </script>
  <style>
    body {
      background-color: #f1f5f9;
      font-family: 'Outfit', sans-serif;
      color: #0f172a;
    }

    #map {
      height: 400px;
      width: 100%;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      margin-bottom: 24px;
    }

    .form-control,
    .form-select {
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      padding: 10px;
    }

    label {
      font-weight: 600;
      color: #475569;
      margin-bottom: 0.5rem;
    }

    h2 {
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 2rem;
    }

    .btn-primary {
      background-color: #4f46e5;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .btn-primary:hover {
      background-color: #4338ca;
      transform: translateY(-1px);
    }

    .card {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }
  </style>
</head>

<body>
  {% include 'navbar.html' %}
  <div class="container mt-5">
    <h2>Smart Scheduling</h2>

    <div class="form-group">
      <label for="num_orders">Number of Orders</label>
      <input type="number" id="num_orders" class="form-control mb-3" min="1" value="1">

      <label for="priority">Priority</label>
      <select id="priority" class="form-control mb-3">
        <option value="high">High</option>
        <option value="medium" selected>Medium</option>
        <option value="low">Low</option>
      </select>

      <div id="orders-container">
        <h5>Orders</h5>
        <div id="order-0" class="order-item">
          <label>Start Location:</label>
          <input type="text" class="form-control mb-2 start-coords" placeholder="Search and pin start location">
          <label>End Location:</label>
          <input type="text" class="form-control mb-2 end-coords" placeholder="Search and pin end location">
        </div>
      </div>
      <button class="btn btn-primary mt-4" id="scheduleButton">Schedule</button>
    </div>
    <div id="result" class="mt-4"></div>
    <div id="map"></div>
  </div>

  <script>
    let leafletMap;
    let markers = [];

    function initLeafletFallback() {
      if (leafletMap) return;
      const mapDiv = document.getElementById("map");
      mapDiv.innerHTML = "";
      leafletMap = L.map(mapDiv).setView([13.0827, 80.2707], 12); // Default to Chennai
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(leafletMap);
    }

    document.getElementById('scheduleButton').addEventListener('click', () => {
      const numOrders = document.getElementById('num_orders').value;
      const priority = document.getElementById('priority').value;
      const orderInputs = [];
      
      for (let i = 0; i < numOrders; i++) {
        const start = document.querySelector(`#order-${i} .start-coords`).value;
        const end = document.querySelector(`#order-${i} .end-coords`).value;
        if (start && end) orderInputs.push({ start, end });
      }

      fetch('/get-routes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ routes: orderInputs.map(o => ({ start: o.start, end: o.end })) }),
      })
      .then(response => response.json())
      .then(data => {
        displayResults(data.routes);
      })
      .catch(error => console.error('Error:', error));
    });

    let polylines = [];

    function displayResults(routes) {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '';
      
      // Clear old markers and polylines
      markers.forEach(m => leafletMap.removeLayer(m));
      markers = [];
      polylines.forEach(p => leafletMap.removeLayer(p));
      polylines = [];

      routes.forEach((route, index) => {
        resultDiv.innerHTML += `
          <div class="card mt-3">
            <div class="card-body">
              <h5 class="card-title">Route ${index + 1}</h5>
              <p class="card-text">Distance: ${route.distance}</p>
              <p class="card-text">Duration: ${route.duration}</p>
              <p class="card-text">CO2 Emissions: ${route.emissions}</p>
            </div>
          </div>`;
          
          // Add markers and polyline for the "route" (mock coords)
          const start = [13.0827 + (index * 0.02), 80.2707 + (index * 0.02)];
          const end = [13.0475 + (index * 0.02), 80.2089 + (index * 0.02)];
          
          const sm = L.marker(start).addTo(leafletMap).bindPopup(`Order ${index + 1} Start`);
          const em = L.marker(end).addTo(leafletMap).bindPopup(`Order ${index + 1} End`);
          markers.push(sm, em);
          
          const poly = L.polyline([start, end], { color: '#4f46e5', weight: 4, opacity: 0.7 }).addTo(leafletMap);
          polylines.push(poly);
      });
      
      if (polylines.length > 0) {
        const group = new L.featureGroup([...markers, ...polylines]);
        leafletMap.fitBounds(group.getBounds());
      }
    }

    document.getElementById('num_orders').addEventListener('input', (e) => {
      const num = e.target.value;
      const container = document.getElementById('orders-container');
      container.innerHTML = '<h5>Orders</h5>';
      for (let i = 0; i < num; i++) {
        container.innerHTML += `
          <div id="order-${i}" class="order-item mt-3 p-3 border rounded">
            <label>Order ${i+1} Start:</label>
            <input type="text" class="form-control mb-2 start-coords" placeholder="e.g. Chennai">
            <label>Order ${i+1} End:</label>
            <input type="text" class="form-control mb-2 end-coords" placeholder="e.g. T.Nagar">
          </div>`;
      }
    });

    initLeafletFallback();
  </script>
</body>

</html>
