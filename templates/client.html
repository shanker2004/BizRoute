<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Leaflet Fallback -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Modern async loading for Google Maps
        (function () {
            const script = document.createElement('script');
            script.src = "https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=places,geometry&callback=initMap&loading=async";
            script.async = true;
            script.defer = true;
            script.onerror = () => {
                console.warn("Google Maps failed to load. Falling back to Leaflet.");
                initLeafletFallback();
            };
            document.head.appendChild(script);
        })();
    </script>
    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Outfit', sans-serif;
            color: #0f172a;
            padding-top: 2rem;
        }

        h2 {
            font-weight: 700;
            font-size: 1.5rem;
            color: #1e293b;
            margin-bottom: 1.5rem;
        }

        .card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            background: #ffffff;
            padding: 24px;
            height: 100%;
        }

        .btn-primary {
            background-color: #4f46e5;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
        }

        .btn-secondary {
            background-color: #1e293b;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
        }

        #map {
            height: 400px;
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            padding: 10px;
        }

        label {
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.5rem;
        }

        .order-list-container {
            margin-top: 30px;
        }

        .table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }
    </style>
</head>

<body>
    {% include 'navbar.html' %}

    <div class="container mt-5">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card p-4">
                    <h2>Place Order</h2>
                    <form id="orderForm" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="productId" class="form-label">Product ID</label>
                            <input type="text" class="form-control" id="productId" required>
                        </div>
                        <div class="mb-3">
                            <label for="deliveryDate" class="form-label">Delivery Date</label>
                            <input type="date" class="form-control" id="deliveryDate" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Search Address (Nominatim)</label>
                            <div class="input-group">
                                <input type="text" id="addressSearch" class="form-control" placeholder="Search address...">
                                <button class="btn btn-outline-secondary" type="button" onclick="searchAddress()">Search</button>
                            </div>
                            <div id="search-results" class="list-group mt-1" style="display:none; position:absolute; z-index:1000; width:90%; max-height:200px; overflow-y:auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"></div>
                        </div>
                        <div class="mb-3">
                            <label for="deliveryLocation" class="form-label">Delivery Location (Coords)</label>
                            <input type="text" class="form-control" id="deliveryLocation" placeholder="Click map or search above"
                                required>
                        </div>
                        <button type="submit" class="btn btn-primary mt-3 w-100">Place Order</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card p-4">
                    <h2>Map</h2>
                    <div id="map"></div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card p-4">
                    <h2>Reschedule Order</h2>
                    <form id="rescheduleForm" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="orderId" class="form-label">Order ID</label>
                            <input type="text" class="form-control" id="orderId" required>
                        </div>
                        <div class="mb-3">
                            <label for="newDate" class="form-label">New Delivery Date</label>
                            <input type="date" class="form-control" id="newDate" required>
                        </div>
                        <button type="submit" class="btn btn-secondary mt-3 w-100">Reschedule Order</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="order-list-container">
            <div class="card">
                <h2>Existing Orders (Mock Storage)</h2>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Product ID</th>
                                <th>Delivery Date</th>
                                <th>Location</th>
                                <th>Created At</th>
                            </tr>
                        </thead>
                        <tbody id="orderListBody">
                            <tr>
                                <td colspan="4" class="text-center">Loading orders...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 2000;">
        <div id="statusToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let leafletMap;
        let marker;
        let selectedLocation = "";
        let toastBootstrap;

        function showToast(message, type = 'primary') {
            const toastEl = document.getElementById('statusToast');
            const toastMsg = document.getElementById('toastMessage');
            
            toastEl.classList.remove('bg-primary', 'bg-success', 'bg-danger', 'bg-warning');
            
            let bgClass = 'bg-primary';
            if (type === 'success') bgClass = 'bg-success';
            if (type === 'error') bgClass = 'bg-danger';
            
            toastEl.classList.add(bgClass);
            toastMsg.innerText = message;
            
            if (!toastBootstrap) toastBootstrap = new bootstrap.Toast(toastEl, { delay: 5000 });
            toastBootstrap.show();
        }

        async function searchAddress() {
            const query = document.getElementById('addressSearch').value;
            if (!query) return;
            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = '<div class="list-group-item">Searching...</div>';
            resultsDiv.style.display = 'block';

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
                const data = await response.json();
                resultsDiv.innerHTML = '';
                if (data.length === 0) {
                    resultsDiv.innerHTML = '<div class="list-group-item">No results found</div>';
                    return;
                }
                data.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'list-group-item list-group-item-action text-start small';
                    btn.innerText = item.display_name;
                    btn.onclick = () => {
                        const lat = parseFloat(item.lat);
                        const lon = parseFloat(item.lon);
                        leafletMap.setView([lat, lon], 14);
                        if (marker) leafletMap.removeLayer(marker);
                        marker = L.marker([lat, lon]).addTo(leafletMap).bindPopup(item.display_name).openPopup();
                        resultsDiv.style.display = 'none';
                        selectedLocation = `${lat.toFixed(4)},${lon.toFixed(4)}`;
                        document.getElementById("deliveryLocation").value = selectedLocation;
                        document.getElementById("addressSearch").value = item.display_name;
                    };
                    resultsDiv.appendChild(btn);
                });
            } catch (error) {
                console.error('Search error:', error);
                resultsDiv.innerHTML = '<div class="list-group-item text-danger">Search failed</div>';
            }
        }

        function initLeafletMap() {
            if (leafletMap) return;
            const mapDiv = document.getElementById("map");
            mapDiv.innerHTML = "";
            
            // Default to Chennai
            leafletMap = L.map(mapDiv).setView([13.0827, 80.2707], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(leafletMap);

            leafletMap.on('click', (e) => {
                const { lat, lng } = e.latlng;
                if (marker) leafletMap.removeLayer(marker);
                marker = L.marker([lat, lng]).addTo(leafletMap);
                selectedLocation = `${lat.toFixed(4)},${lng.toFixed(4)}`;
                document.getElementById("deliveryLocation").value = selectedLocation;
            });

            // Try to geolocate
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const { latitude, longitude } = position.coords;
                    leafletMap.setView([latitude, longitude], 13);
                });
            }
        }

        async function fetchOrders() {
            try {
                const tbody = document.getElementById("orderListBody");
                const response = await fetch("/get_orders");
                const orders = await response.json();
                tbody.innerHTML = "";

                if (orders.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='4' class='text-center'>No orders found.</td></tr>";
                    return;
                }

                orders.slice().reverse().forEach(order => {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${order.productId}</td>
                        <td>${order.customerName || 'B2B Client'}</td>
                        <td>${order.address || order.deliveryLocation}</td>
                        <td><span class="badge ${order.status === 'In Transit' ? 'bg-success' : 'bg-primary'}">${order.status || 'Pending'}</span></td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (e) {
                console.error("Failed to fetch orders:", e);
            }
        }

        document.getElementById("orderForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const pId = document.getElementById("productId").value;
            const dDate = document.getElementById("deliveryDate").value;
            const dLoc = selectedLocation || document.getElementById("deliveryLocation").value;

            if (!pId || !dDate || !dLoc) {
                alert("Please fill all fields and select a location on the map.");
                return;
            }

            const response = await fetch("/place_order", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    productId: pId,
                    deliveryDate: dDate,
                    deliveryLocation: dLoc
                }),
            });
            const result = await response.json();
            showToast(result.message, response.ok ? 'success' : 'error');
            fetchOrders();
        });

        document.getElementById("rescheduleForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const oId = document.getElementById("orderId").value;
            const nDate = document.getElementById("newDate").value;

            const response = await fetch("/reschedule_order", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ orderId: oId, newDate: nDate }),
            });

            const result = await response.json();
            showToast(result.message, response.ok ? 'success' : 'error');
            fetchOrders();
        });

        window.onload = () => {
            initLeafletMap();
            fetchOrders();
        };
    </script>
</body>

</html>
</body>

</html>
